<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЭкзамПлатформа | Премиум подготовка</title>
    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            @media (max-width: 768px) {
    /* стили для телефонов */
}
        }

        body {
            min-height: 100vh;
            background: #0c0f15;
            background-image: radial-gradient(circle at 30% 40%, #1e232e 0%, #0c0f15 90%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        #app {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Премиум карточки */
        .luxury-card {
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -25px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(212, 175, 55, 0.3), 0 0 30px rgba(212, 175, 55, 0.2);
            padding: 2.2rem;
            color: #f0f3fa;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .luxury-card:hover {
            box-shadow: 0 40px 80px -25px #000, 0 0 0 1px rgba(212, 175, 55, 0.6), 0 0 50px rgba(212, 175, 55, 0.4);
        }

        /* Кнопки */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.05);
            color: #f0f3fa;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 10px 20px -12px black;
        }

        .btn-primary {
            background: linear-gradient(145deg, #D4AF37, #B8860B);
            border: 1px solid rgba(255, 215, 120, 0.7);
            color: #0c0f15;
            font-weight: 700;
            box-shadow: 0 10px 20px -8px #D4AF37, 0 0 20px #D4AF37;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #E5C25F, #C9991E);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 18px 30px -8px #D4AF37, 0 0 40px #D4AF37;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #D4AF37;
            color: #F0E6D2;
        }

        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #F5D76E;
            color: white;
            box-shadow: 0 0 30px #D4AF37;
        }

        /* Формы */
        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #F0E6D2;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 1.2rem 1.8rem;
            border-radius: 3rem;
            border: 2px solid rgba(212, 175, 55, 0.3);
            background: rgba(0, 0, 0, 0.3);
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            color: white;
        }

        .form-group input:focus {
            border-color: #D4AF37;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 30px #D4AF37, 0 0 10px #D4AF37 inset;
        }

        /* Навигация */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .nav-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #F0E6D2, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: none;
            border: 2px solid #D4AF37;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            color: #F0E6D2;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
        }

        .back-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 30px #D4AF37;
        }

        /* Главная страница (карточки предметов) */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2.5rem;
        }

        .subject-card {
            background: rgba(20, 25, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            box-shadow: 0 20px 40px -20px black;
        }

        .subject-card:hover {
            border-color: #D4AF37;
            transform: translateY(-10px);
            box-shadow: 0 30px 50px -25px #D4AF37;
        }

        .subject-icon {
            font-size: 4rem;
            color: #D4AF37;
            background: rgba(212, 175, 55, 0.15);
            width: 6rem;
            height: 6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2rem;
            margin: 0 auto 0.5rem;
        }

        .subject-name {
            font-size: 2.2rem;
            font-weight: 600;
            color: #F0E6D2;
        }

        .exam-info {
            display: flex;
            justify-content: center;
            gap: 1rem;
            font-size: 1rem;
            color: #B0B8C5;
        }

        .countdown-large {
            font-size: 1.5rem;
            font-weight: 700;
            color: #D4AF37;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 3rem;
            display: inline-block;
        }

        .progress-container {
            width: 100%;
            margin: 0.5rem 0;
        }

        .progress-bar-container {
            width: 100%;
            height: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #D4AF37;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #D4AF37, #F5D76E);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 15px #D4AF37;
        }

        /* Список билетов */
        .tickets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2.5rem;
        }

        .ticket-card {
            background: rgba(20, 25, 35, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 15px 30px -15px black;
        }

        .ticket-card:hover {
            border-color: #D4AF37;
            transform: translateY(-6px);
            box-shadow: 0 25px 40px -20px #D4AF37;
        }

        .ticket-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .ticket-header i {
            font-size: 2.2rem;
            color: #D4AF37;
        }

        .ticket-title {
            font-weight: 600;
            font-size: 1.2rem;
            color: #F0E6D2;
            flex: 1;
        }

        .ticket-studied {
            font-size: 1.8rem;
            color: #D4AF37;
            cursor: pointer;
            transition: 0.2s;
        }

        .ticket-studied.empty {
            color: rgba(212, 175, 55, 0.3);
        }

        .ticket-studied:hover {
            transform: scale(1.2);
            text-shadow: 0 0 20px #D4AF37;
        }

        /* Страница билета (детальный просмотр) */
        .ticket-detail-page {
            background: rgba(20, 25, 35, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            padding: 3rem;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 40px 80px -30px black;
        }

        .detail-tabs {
            display: flex;
            gap: 1.5rem;
            margin: 2rem 0 2.5rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: #B0B8C5;
            cursor: pointer;
            border-radius: 3rem;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: rgba(212, 175, 55, 0.2);
            color: #D4AF37;
            border: 1px solid #D4AF37;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Теория */
        .theory-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .theory-header {
            padding: 1.2rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            color: #F0E6D2;
            transition: 0.2s;
        }

        .theory-header:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .theory-header i {
            transition: transform 0.3s;
            color: #D4AF37;
        }

        .theory-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            padding: 0 1.8rem;
            background: rgba(0, 0, 0, 0.3);
        }

        .theory-body.open {
            max-height: 1500px;
            padding: 1.8rem;
        }

        .theory-body p, .theory-body li, .theory-body span {
            color: #e0e5f0;
        }

        /* Примеры */
        .example-box {
            background: rgba(212, 175, 55, 0.08);
            border-left: 6px solid #D4AF37;
            border-radius: 1.5rem;
            padding: 1.2rem 1.8rem;
            margin: 1.5rem 0;
            display: flex;
            align-items: flex-start;
            gap: 1.2rem;
        }

        .example-box i {
            font-size: 2rem;
            color: #D4AF37;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.8rem;
            border-radius: 50%;
        }

        .example-text p {
            margin-bottom: 0.5rem;
            color: #e0e5f0;
        }

        .example-text strong {
            color: #D4AF37;
        }

        /* SVG */
        .theory-svg {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid #D4AF37;
        }

        .theory-svg svg {
            width: 100%;
            max-width: 500px;
            height: auto;
            filter: drop-shadow(0 0 20px #D4AF37);
        }

        .theory-svg svg text {
            fill: #ffffff;
            font-size: 12px;
        }

        /* Задачи */
        .task-card {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .task-card p {
            color: #e0e5f0;
        }

        .solution {
            background: #1a1f2e;
            padding: 1.5rem;
            border-radius: 1.5rem;
            margin-top: 1rem;
            border-left: 6px solid #D4AF37;
            color: #e0e5f0;
            line-height: 1.7;
        }

        .solution .formula {
            font-family: monospace;
            background: #0c0f15;
            padding: 0.2rem 0.5rem;
            border-radius: 0.8rem;
            color: #D4AF37;
        }

        /* Тест */
        .quiz-question {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .quiz-question p {
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #F0E6D2;
        }

        .quiz-option {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.8rem;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid transparent;
        }

        .quiz-option:hover {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.15);
        }

        .quiz-option label {
            color: #e0e5f0;
        }

        .quiz-option input[type="radio"] {
            accent-color: #D4AF37;
            width: 1.2rem;
            height: 1.2rem;
        }

        hr {
            margin: 2rem 0;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            // ---------- ДАННЫЕ ----------
            const TODAY = new Date(2026, 1, 22);
            const subjects = [
                { id: 'math', name: 'Математика', icon: 'fa-square-root-variable', examStart: '14.06.2026', examEnd: '15.06.2026' },
                { id: 'russian', name: 'Русский язык', icon: 'fa-language', examStart: '08.06.2026', examEnd: '09.06.2026' },
                { id: 'physics', name: 'Физика', icon: 'fa-flask', examStart: '23.06.2026', examEnd: '24.06.2026' },
                { id: 'informatics', name: 'Информатика', icon: 'fa-laptop-code', examStart: '21.05.2026', examEnd: '22.05.2026' }
            ];

            const physicsTickets = [];
            for (let i = 1; i <= 40; i++) {
                if (i === 1) {
                    physicsTickets.push({
                        id: 1,
                        title: 'Билет 1: Механическое движение и системы отсчёта',
                        theorySections: [ /* ... существующий код билета 1 ... */ ],
                        tasks: [ /* ... */ ],
                        quiz: [ /* ... */ ]
                    });
                } else if (i === 2) {
                    physicsTickets.push({
                        id: 2,
                        title: 'Билет 2: Законы Ньютона. Инерциальные системы отсчёта. Сила. Масса.',
                        theorySections: [ /* ... существующий код билета 2 ... */ ],
                        tasks: [ /* ... */ ],
                        quiz: [ /* ... */ ]
                    });
                } else if (i === 3) {
                    physicsTickets.push({
                        id: 3,
                        title: 'Билет 3: Силы в механике. Закон всемирного тяготения. Вес тела.',
                        theorySections: [ /* ... существующий код билета 3 ... */ ],
                        tasks: [ /* ... */ ],
                        quiz: [ /* ... */ ]
                    });
                } else if (i === 4) {
                    physicsTickets.push({
                        id: 4,
                        title: 'Билет 4: Импульс тела. Закон сохранения импульса. Реактивное движение.',
                        theorySections: [ /* ... существующий код билета 4 ... */ ],
                        tasks: [ /* ... */ ],
                        quiz: [ /* ... */ ]
                    });
                } else if (i === 5) {
                    physicsTickets.push({
                        id: 5,
                        title: 'Билет 5: Механическая работа и мощность. КПД. Виды механической энергии. Закон сохранения механической энергии.',
                        theorySections: [
                            {
                                title: '🔨 Механическая работа',
                                content: `
                                    <p><strong>Механическая работа</strong> совершается, когда на тело действует сила и оно перемещается. <span class="formula">A = F·s·cosα</span>, где α – угол между направлением силы и перемещения. Единица – джоуль (Дж).</p>
                                    <div class="example-box">
                                        <i class="fas fa-dumbbell"></i>
                                        <div class="example-text">
                                            <p><strong>Пример:</strong> Если вы толкаете шкаф с силой 100 Н и он перемещается на 2 м, работа равна 200 Дж (при совпадении направлений).</p>
                                        </div>
                                    </div>
                                    <div class="theory-svg">
                                        <svg width="300" height="120" viewBox="0 0 300 120">
                                            <rect width="300" height="120" fill="#1a1f2e" rx="20" ry="20"/>
                                            <rect x="50" y="50" width="60" height="40" fill="#D4AF37" rx="5"/>
                                            <text x="60" y="80" fill="white" font-size="10">тело</text>
                                            <line x1="110" y1="70" x2="220" y2="70" stroke="white" stroke-width="3"/>
                                            <polygon points="220,65 230,70 220,75" fill="white"/>
                                            <text x="140" y="50" fill="white" font-size="12">F</text>
                                            <line x1="50" y1="90" x2="50" y2="100" stroke="#F0E6D2" stroke-width="2" stroke-dasharray="2"/>
                                            <line x1="110" y1="90" x2="110" y2="100" stroke="#F0E6D2" stroke-width="2" stroke-dasharray="2"/>
                                            <text x="70" y="110" fill="#F0E6D2" font-size="10">s</text>
                                        </svg>
                                    </div>
                                `
                            },
                            {
                                title: '⚡ Мощность',
                                content: `
                                    <p><strong>Мощность</strong> – скорость совершения работы: <span class="formula">N = A/t</span>. Единица – ватт (Вт).</p>
                                    <div class="example-box">
                                        <i class="fas fa-car"></i>
                                        <div class="example-text">
                                            <p><strong>Пример:</strong> Автомобиль, совершающий работу 200 кДж за 10 с, имеет мощность 20 кВт.</p>
                                        </div>
                                    </div>
                                `
                            },
                            {
                                title: '📊 Коэффициент полезного действия (КПД)',
                                content: `
                                    <p><strong>КПД</strong> показывает, какая доля затраченной работы превращается в полезную: <span class="formula">η = (A_полезная / A_затраченная) · 100%</span>.</p>
                                    <div class="example-box">
                                        <i class="fas fa-fan"></i>
                                        <div class="example-text">
                                            <p><strong>Пример:</strong> Двигатель, затрачивая 1000 Дж энергии, совершает полезную работу 400 Дж – его КПД 40%.</p>
                                        </div>
                                    </div>
                                `
                            },
                            {
                                title: '💫 Виды механической энергии',
                                content: `
                                    <p><strong>Кинетическая энергия</strong> – энергия движения: <span class="formula">E_k = mv²/2</span>.</p>
                                    <p><strong>Потенциальная энергия</strong> – энергия взаимодействия: для гравитации <span class="formula">E_p = mgh</span>, для упругости <span class="formula">E_p = kx²/2</span>.</p>
                                    <div class="example-box">
                                        <i class="fas fa-basketball-ball"></i>
                                        <div class="example-text">
                                            <p><strong>Пример:</strong> Летящий мяч обладает кинетической энергией; поднятый над землёй – потенциальной.</p>
                                        </div>
                                    </div>
                                    <div class="theory-svg">
                                        <svg width="300" height="150" viewBox="0 0 300 150">
                                            <rect width="300" height="150" fill="#1a1f2e" rx="20" ry="20"/>
                                            <circle cx="150" cy="60" r="20" fill="#D4AF37" stroke="#fff" stroke-width="2"/>
                                            <text x="135" y="55" fill="white" font-size="10">мяч</text>
                                            <line x1="150" y1="80" x2="150" y2="130" stroke="white" stroke-width="2" stroke-dasharray="3"/>
                                            <text x="160" y="105" fill="white" font-size="10">h</text>
                                            <rect x="100" y="130" width="100" height="10" fill="#F0E6D2" rx="2"/>
                                            <text x="130" y="145" fill="white" font-size="8">земля</text>
                                        </svg>
                                    </div>
                                `
                            },
                            {
                                title: '♻️ Закон сохранения механической энергии',
                                content: `
                                    <p>В замкнутой системе, где действуют только консервативные силы, полная механическая энергия сохраняется: <span class="formula">E_k + E_p = const</span>.</p>
                                    <div class="example-box">
                                        <i class="fas fa-sync-alt"></i>
                                        <div class="example-text">
                                            <p><strong>Пример:</strong> Маятник: при движении вниз потенциальная энергия переходит в кинетическую, вверх – наоборот.</p>
                                        </div>
                                    </div>
                                `
                            }
                        ],
                        tasks: [
                            {
                                question: 'Ящик массой 20 кг равномерно перемещают по горизонтальному полу на расстояние 5 м, прикладывая силу 50 Н под углом 60° к горизонту. Найдите совершённую работу. cos60° = 0,5.',
                                solution: `
                                    <p><strong>Подробное решение:</strong></p>
                                    <p>1. Работа силы: <span class="formula">A = F·s·cosα</span>.</p>
                                    <p>2. Подставляем: <span class="formula">A = 50 · 5 · 0,5 = 125 Дж</span>.</p>
                                    <p><strong>Ответ:</strong> 125 Дж.</p>
                                `

                content: '<p>Если каждый акт деления вызывает деление ещё хотя бы одного ядра, реакция становится самоподдерживающейся. Условие: коэффициент размножения нейтронов k ≥ 1. Управляемая реакция – в ядерных реакторах, неуправляемая – в атомной бомбе.</p><div class="theory-svg"><svg width="350" height="150" viewBox="0 0 350 150"><rect width="350" height="150" fill="#1a1f2e" rx="20" ry="20"/><circle cx="100" cy="75" r="20" fill="#D4AF37"/><circle cx="200" cy="50" r="10" fill="#F0E6D2"/><circle cx="200" cy="100" r="10" fill="#F0E6D2"/><line x1="115" y1="70" x2="190" y2="45" stroke="white"/><line x1="115" y1="80" x2="190" y2="95" stroke="white"/></svg></div>'
            },
            {
                title: '☀️ Термоядерные реакции',
                content: '<p>Реакции синтеза лёгких ядер (например, дейтерия и трития) при очень высоких температурах (миллионы градусов). Выделяется огромная энергия. Протекают в звёздах, в водородной бомбе. Управляемый термоядерный синтез (токамаки) – перспективный источник энергии.</p>'
            }
        ],
        tasks: [
            { question: 'При делении одного ядра урана выделяется около 200 МэВ энергии. Сколько энергии выделится при делении 1 г урана-235? (NA = 6,02·10²³ моль⁻¹)', solution: '<p><strong>Решение:</strong> Число атомов в 1 г: N = (1/235)·6,02·10²³ ≈ 2,56·10²¹. E = 2,56·10²¹·200·10⁶ эВ = 5,12·10²⁹ эВ = 5,12·10²⁹·1,6·10⁻¹⁹ Дж ≈ 8,2·10¹⁰ Дж = 82 ГДж. <strong>Ответ:</strong> ≈82 ГДж.</p>' },
            { question: 'Что такое критическая масса?', solution: '<p><strong>Решение:</strong> Минимальная масса делящегося вещества, при которой возможна самоподдерживающаяся цепная реакция. <strong>Ответ:</strong> минимальная масса для цепной реакции.</p>' },
            { question: 'Какая реакция называется термоядерной?', solution: '<p><strong>Решение:</strong> Реакция слияния лёгких ядер при высоких температурах. <strong>Ответ:</strong> реакция синтеза лёгких ядер.</p>' }
        ],
        quiz: [
            { question: 'Какое ядро обычно используют для цепной реакции?', options: ['уран-235', 'уран-238', 'плутоний-239', 'торий-232'], correct: 0 },
            { question: 'Коэффициент размножения нейтронов k > 1 означает...', options: ['реакция нарастает', 'реакция затухает', 'стационарная реакция', 'критическая масса'], correct: 0 },
            { question: 'В ядерном реакторе замедлитель нужен для...', options: ['замедления быстрых нейтронов', 'поглощения нейтронов', 'охлаждения', 'отражения нейтронов'], correct: 0 },
            { question: 'Термоядерные реакции протекают в...', options: ['звёздах', 'атомных бомбах', 'ядерных реакторах', 'ускорителях'], correct: 0 },
            { question: 'При делении урана выделяется энергия за счёт...', options: ['дефекта масс', 'синтеза', 'радиоактивности', 'трения'], correct: 0 },
            { question: 'Цепная реакция деления управляется с помощью...', options: ['поглотителей нейтронов', 'замедлителей', 'отражателей', 'всех перечисленных'], correct: 3 },
            { question: 'Водородная бомба основана на...', options: ['термоядерном синтезе', 'делении урана', 'радиоактивном распаде', 'аннигиляции'], correct: 0 },
            { question: 'Первый ядерный реактор был построен под руководством...', options: ['Ферми', 'Курчатова', 'Оппенгеймера', 'Сахарова'], correct: 0 },
            { question: 'В термоядерном синтезе выделяется энергия благодаря...', options: ['дефекту масс', 'делению', 'радиоактивности', 'трению'], correct: 0 },
            { question: 'Токамак – это установка для...', options: ['управляемого термоядерного синтеза', 'деления ядер', 'ускорения частиц', 'изучения космических лучей'], correct: 0 }
        ]
    });

                } else {
                    physicsTickets.push({
                        id: i,
                        title: `Билет ${i}: Тема будет добавлена позже.`,
                        theorySections: [{ title: 'Теория отсутствует', content: '<p>Раздел в разработке.</p>' }],
                        tasks: [],
                        quiz: []
                    });
                }
            }

            // ---------- ФУНКЦИИ ----------
            function parseDate(dateStr) {
                const [d, m, y] = dateStr.split('.').map(Number);
                return new Date(y, m-1, d);
            }

            function daysUntil(examDateStr) {
                const examDate = parseDate(examDateStr);
                const diffTime = examDate - TODAY;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays < 0) return 'Завершён';
                if (diffDays === 0) return 'Сегодня!';
                return `${diffDays} дн.`;
            }

            // ---------- СОСТОЯНИЕ ----------
            let state = {
                currentPage: 'login',
                currentSubject: null,
                currentTicket: null,
                user: null,
                progress: {},
                activeTab: 'theory'
            };

            const savedUser = localStorage.getItem('exam_user');
            if (savedUser) {
                state.user = JSON.parse(savedUser);
                const savedProgress = localStorage.getItem(`progress_${state.user.name}`);
                if (savedProgress) {
                    state.progress = JSON.parse(savedProgress);
                } else {
                    state.progress = { physics: { studied: [] } };
                }
                state.currentPage = 'dashboard';
            }

            function saveProgress() {
                if (state.user) {
                    localStorage.setItem(`progress_${state.user.name}`, JSON.stringify(state.progress));
                }
            }

            function toggleTicketStudied(ticketId) {
                if (!state.progress.physics) state.progress.physics = { studied: [] };
                const studied = state.progress.physics.studied;
                const index = studied.indexOf(ticketId);
                if (index === -1) studied.push(ticketId);
                else studied.splice(index, 1);
                saveProgress();
            }

            function isTicketStudied(ticketId) {
                return state.progress.physics?.studied?.includes(ticketId) || false;
            }

            // ---------- РЕНДЕР (оставлен как в предыдущей версии, без изменений) ----------
            const appEl = document.getElementById('app');

            function render() {
                switch (state.currentPage) {
                    case 'login': renderLogin(); break;
                    case 'register': renderRegister(); break;
                    case 'dashboard': renderDashboard(); break;
                    case 'subjectTickets': renderSubjectTickets(); break;
                    case 'ticketDetail': renderTicketDetail(); break;
                    default: renderLogin();
                }
            }

            function renderLogin() {
                appEl.innerHTML = `
                    <div style="max-width: 480px; margin: 2rem auto;">
                        <div class="luxury-card">
                            <h1 style="font-size: 3.5rem; margin-bottom: 0.5rem; background: linear-gradient(145deg,#F0E6D2,#D4AF37); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Добро пожаловать</h1>
                            <p style="margin-bottom: 2.5rem; color:#B0B8C5;">Войдите, чтобы продолжить</p>
                            <form id="login-form">
                                <div class="form-group">
                                    <label><i class="fas fa-user"></i> Имя пользователя</label>
                                    <input type="text" id="username" placeholder="например: иван_физик" required>
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-lock"></i> Пароль</label>
                                    <input type="password" id="password" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="btn btn-primary" style="width:100%;"><i class="fas fa-sign-in-alt"></i> Войти</button>
                                <p style="margin-top:2rem; text-align:center;">
                                    Нет аккаунта? <a href="#" id="go-to-register" style="color:#D4AF37; font-weight:600;">Зарегистрироваться</a>
                                </p>
                            </form>
                        </div>
                    </div>
                `;

                document.getElementById('login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const username = document.getElementById('username').value.trim();
                    if (username) {
                        const user = { name: username };
                        localStorage.setItem('exam_user', JSON.stringify(user));
                        state.user = user;
                        const savedProgress = localStorage.getItem(`progress_${user.name}`);
                        state.progress = savedProgress ? JSON.parse(savedProgress) : { physics: { studied: [] } };
                        state.currentPage = 'dashboard';
                        render();
                    }
                });

                document.getElementById('go-to-register').addEventListener('click', (e) => {
                    e.preventDefault();
                    state.currentPage = 'register';
                    render();
                });
            }

            function renderRegister() {
                appEl.innerHTML = `
                    <div style="max-width: 480px; margin: 2rem auto;">
                        <div class="luxury-card">
                            <h1 style="font-size: 3.5rem; margin-bottom: 0.5rem; background: linear-gradient(145deg,#F0E6D2,#D4AF37); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Регистрация</h1>
                            <p style="margin-bottom: 2.5rem; color:#B0B8C5;">Создайте аккаунт</p>
                            <form id="register-form">
                                <div class="form-group">
                                    <label><i class="fas fa-user"></i> Имя</label>
                                    <input type="text" id="reg-name" placeholder="Иван Иванов" required>
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-envelope"></i> Email</label>
                                    <input type="email" id="reg-email" placeholder="ivan@example.com" required>
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-lock"></i> Пароль</label>
                                    <input type="password" id="reg-password" placeholder="придумайте пароль" required>
                                </div>
                                <button type="submit" class="btn btn-primary" style="width:100%;"><i class="fas fa-user-plus"></i> Зарегистрироваться</button>
                                <p style="margin-top:2rem; text-align:center;">
                                    Уже есть аккаунт? <a href="#" id="go-to-login" style="color:#D4AF37; font-weight:600;">Войти</a>
                                </p>
                            </form>
                        </div>
                    </div>
                `;

                document.getElementById('register-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('reg-name').value.trim();
                    if (name) {
                        const user = { name: name };
                        localStorage.setItem('exam_user', JSON.stringify(user));
                        state.user = user;
                        state.progress = { physics: { studied: [] } };
                        saveProgress();
                        state.currentPage = 'dashboard';
                        render();
                    }
                });

                document.getElementById('go-to-login').addEventListener('click', (e) => {
                    e.preventDefault();
                    state.currentPage = 'login';
                    render();
                });
            }

            function renderDashboard() {
                const userName = state.user?.name || 'друг';
                const cardsHtml = subjects.map(subj => {
                    const days = daysUntil(subj.examStart);
                    const progress = subj.id === 'physics' ? state.progress.physics?.studied?.length || 0 : 0;
                    const total = subj.id === 'physics' ? 40 : 0;
                    const percent = total ? (progress / total * 100).toFixed(0) : 0;
                    return `
                        <div class="subject-card" data-subject="${subj.id}">
                            <div class="subject-icon">
                                <i class="fas ${subj.icon}"></i>
                            </div>
                            <div class="subject-name">${subj.name}</div>
                            <div class="exam-info">
                                <span>📅 ${subj.examStart} — ${subj.examEnd}</span>
                            </div>
                            <div class="countdown-large">⏳ ${days}</div>
                            ${subj.id === 'physics' ? `
                                <div class="progress-container">
                                    <div class="progress-bar-container">
                                        <div class="progress-bar" style="width: ${percent}%;"></div>
                                    </div>
                                    <div style="margin-top:0.3rem;">${progress}/${total}</div>
                                </div>
                            ` : ''}
                            <button class="btn btn-primary start-learning" data-subject="${subj.id}" style="margin-top:0.5rem;">
                                Приступить <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    `;
                }).join('');

                appEl.innerHTML = `
                    <div class="luxury-card">
                        <div class="nav-header">
                            <h1>👋 Привет, ${userName}!</h1>
                            <button class="btn-outline btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                        </div>
                        <p style="font-size:1.2rem; color:#B0B8C5; margin-bottom:1rem;">Выбери предмет для подготовки</p>
                        <div class="subjects-grid">
                            ${cardsHtml}
                        </div>
                    </div>
                `;

                document.querySelectorAll('.start-learning').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const subjectId = e.currentTarget.dataset.subject;
                        state.currentSubject = subjects.find(s => s.id === subjectId);
                        if (subjectId === 'physics') {
                            state.currentPage = 'subjectTickets';
                            render();
                        } else {
                            alert('⚡ Билеты появятся позже. Сейчас доступна только физика.');
                        }
                    });
                });

                document.getElementById('logout-btn').addEventListener('click', () => {
                    localStorage.removeItem('exam_user');
                    state.user = null;
                    state.currentPage = 'login';
                    render();
                });
            }

            function renderSubjectTickets() {
                if (!state.currentSubject || state.currentSubject.id !== 'physics') return;

                const totalTickets = physicsTickets.length;
                const studiedCount = state.progress.physics?.studied?.length || 0;
                const percent = (studiedCount / totalTickets * 100).toFixed(0);

                const ticketsHtml = physicsTickets.map(ticket => {
                    const studied = isTicketStudied(ticket.id);
                    return `
                        <div class="ticket-card" data-ticket-id="${ticket.id}">
                            <div class="ticket-header">
                                <i class="fas fa-book-open"></i>
                                <span class="ticket-title">${ticket.title}</span>
                                <span class="ticket-studied ${studied ? '' : 'empty'}" data-ticket-id="${ticket.id}">
                                    <i class="fas ${studied ? 'fa-check-circle' : 'fa-circle'}"></i>
                                </span>
                            </div>
                        </div>
                    `;
                }).join('');

                appEl.innerHTML = `
                    <div class="luxury-card">
                        <div style="display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem;">
                            <button class="back-btn" id="back-to-dashboard"><i class="fas fa-arrow-left"></i> Назад</button>
                            <div style="display: flex; align-items: center; gap: 1.5rem;">
                                <div class="subject-icon" style="width:5rem; height:5rem; font-size:2.5rem;">
                                    <i class="fas ${state.currentSubject.icon}"></i>
                                </div>
                                <h1 style="font-size: 2.8rem; color: #F0E6D2;">${state.currentSubject.name}</h1>
                            </div>
                            <div style="margin-left: auto; display: flex; gap: 2rem; align-items: center;">
                                <span class="stat-card">📅 ${state.currentSubject.examStart} — ${state.currentSubject.examEnd}</span>
                                <span class="stat-card">⏳ ${daysUntil(state.currentSubject.examStart)}</span>
                                <div style="width:150px;">
                                    <div class="progress-bar-container">
                                        <div class="progress-bar" style="width: ${percent}%;"></div>
                                    </div>
                                    <div style="font-size:0.9rem; margin-top:0.3rem;">${studiedCount}/${totalTickets}</div>
                                </div>
                            </div>
                        </div>
                        <div class="tickets-grid">
                            ${ticketsHtml}
                        </div>
                    </div>
                `;

                document.getElementById('back-to-dashboard').addEventListener('click', () => {
                    state.currentPage = 'dashboard';
                    render();
                });

                document.querySelectorAll('.ticket-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('.ticket-studied')) return;
                        const ticketId = parseInt(card.dataset.ticketId);
                        state.currentTicket = physicsTickets.find(t => t.id === ticketId);
                        state.activeTab = 'theory';
                        state.currentPage = 'ticketDetail';
                        render();
                    });
                });

                document.querySelectorAll('.ticket-studied').forEach(icon => {
                    icon.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const ticketId = parseInt(icon.dataset.ticketId);
                        toggleTicketStudied(ticketId);
                        renderSubjectTickets();
                    });
                });
            }

            function renderTicketDetail() {
                const ticket = state.currentTicket;
                if (!ticket) return;

                // Теория (аккордеон)
                let theoryHtml = '';
                ticket.theorySections.forEach((section, idx) => {
                    theoryHtml += `
                        <div class="theory-section">
                            <div class="theory-header" data-section="${idx}">
                                <span>${section.title}</span>
                                <i class="fas fa-chevron-down"></i>
                            </div>
                            <div class="theory-body" id="theory-body-${ticket.id}-${idx}">
                                ${section.content}
                            </div>
                        </div>
                    `;
                });

                // Задачи
                let tasksHtml = '';
                ticket.tasks.forEach((task, idx) => {
                    tasksHtml += `
                        <div class="task-card">
                            <p><strong>Задача ${idx+1}:</strong> ${task.question}</p>
                            <div class="solution">${task.solution}</div>
                        </div>
                    `;
                });

                // Тест
                let quizHtml = '';
                if (ticket.quiz.length) {
                    quizHtml += `<form id="quiz-form-${ticket.id}">`;
                    ticket.quiz.forEach((q, idx) => {
                        quizHtml += `
                            <div class="quiz-question">
                                <p>${idx+1}. ${q.question}</p>
                                ${q.options.map((opt, optIdx) => `
                                    <div class="quiz-option">
                                        <input type="radio" name="q${idx}-${ticket.id}" value="${optIdx}" id="q${idx}opt${optIdx}-${ticket.id}">
                                        <label for="q${idx}opt${optIdx}-${ticket.id}">${opt}</label>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    });
                    quizHtml += `<button type="submit" class="btn btn-primary" style="margin-top:1rem;">Проверить</button></form>`;
                    quizHtml += `<div id="quiz-result-${ticket.id}" style="margin-top:1rem;"></div>`;
                } else {
                    quizHtml = '<p>Теста пока нет.</p>';
                }

                appEl.innerHTML = `
                    <div class="ticket-detail-page">
                        <div style="display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem;">
                            <button class="back-btn" id="back-to-tickets"><i class="fas fa-arrow-left"></i> К списку</button>
                            <h1 style="font-size: 2rem; color: #F0E6D2;">${ticket.title}</h1>
                        </div>
                        <div class="detail-tabs">
                            <button class="tab-btn ${state.activeTab === 'theory' ? 'active' : ''}" data-tab="theory">📚 Теория</button>
                            <button class="tab-btn ${state.activeTab === 'tasks' ? 'active' : ''}" data-tab="tasks">✏️ Задачи</button>
                            <button class="tab-btn ${state.activeTab === 'quiz' ? 'active' : ''}" data-tab="quiz">🧪 Тест</button>
                        </div>
                        <div class="tab-content ${state.activeTab === 'theory' ? 'active' : ''}">
                            ${theoryHtml}
                        </div>
                        <div class="tab-content ${state.activeTab === 'tasks' ? 'active' : ''}">
                            ${tasksHtml}
                        </div>
                        <div class="tab-content ${state.activeTab === 'quiz' ? 'active' : ''}">
                            ${quizHtml}
                        </div>
                    </div>
                `;

                document.getElementById('back-to-tickets').addEventListener('click', () => {
                    state.currentPage = 'subjectTickets';
                    render();
                });

                // Переключение вкладок
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.activeTab = btn.dataset.tab;
                        renderTicketDetail();
                    });
                });

                // Аккордеон теории
                ticket.theorySections.forEach((_, idx) => {
                    const header = document.querySelector(`.theory-header[data-section="${idx}"]`);
                    const body = document.getElementById(`theory-body-${ticket.id}-${idx}`);
                    if (header && body) {
                        header.addEventListener('click', (e) => {
                            e.stopPropagation();
                            body.classList.toggle('open');
                            const icon = header.querySelector('i');
                            icon.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0)';
                        });
                    }
                });

                // Обработка теста
                const form = document.getElementById(`quiz-form-${ticket.id}`);
                if (form) {
                    form.addEventListener('submit', (e) => {
                        e.preventDefault();
                        let correct = 0;
                        ticket.quiz.forEach((q, idx) => {
                            const selected = document.querySelector(`input[name="q${idx}-${ticket.id}"]:checked`);
                            if (selected && parseInt(selected.value) === q.correct) correct++;
                        });
                        document.getElementById(`quiz-result-${ticket.id}`).innerHTML = `
                            <div style="background:#1a1f2e; padding:1rem; border-radius:2rem; text-align:center; border:1px solid #D4AF37;">
                                ✅ Правильно: ${correct} из ${ticket.quiz.length}
                            </div>
                        `;
                    });
                }
            }

            render();
        })();
    </script>
</body>
</html>
